# Fireworks AI 云端推理预设
# 使用方法：
#   1. 注册 Fireworks AI: https://fireworks.ai
#   2. 获取 API key，设置环境变量: export FIREWORKS_API_KEY="your_fireworks_api_key_here"
#   3. 将此文件内容合并到 config/providers.toml 和 config/models.toml
#
# 定价来源: https://fireworks.ai/pricing  # verified: 2026-04-06

[providers.fireworks]
display_name = "Fireworks AI"
base_url = "https://api.fireworks.ai/inference/v1"  # verified: 2026-04-06
api_key_env = "FIREWORKS_API_KEY"
auth_header = "Authorization"
auth_scheme = "Bearer"
timeout_secs = 120
max_retries = 3
openai_compatible = true

# --- 模型定义 ---
# Fireworks 模型 ID 格式为 accounts/fireworks/models/<model>

# verified: 2026-04-06
[[models]]
id = "accounts/fireworks/models/llama-v3p1-70b-instruct"
provider = "fireworks"
display_name = "Llama 3.1 70B Instruct (Fireworks)"
context_window = 131072
max_output_tokens = 8192
input_price_per_1m = 0.90
output_price_per_1m = 0.90
capabilities = ["Chat", "CodeGeneration", "Reasoning"]
[models.features]
vision = false
tool_use = true
json_mode = true
streaming = true
system_prompt = true

