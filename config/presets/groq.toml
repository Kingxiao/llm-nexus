# Groq 云端推理预设（LPU 硬件加速，超低延迟）
# 使用方法：
#   1. 注册 Groq: https://console.groq.com
#   2. 获取 API key，设置环境变量: export GROQ_API_KEY="your_groq_api_key_here"
#   3. 将此文件内容合并到 config/providers.toml 和 config/models.toml
#
# 定价来源: https://groq.com/pricing  # verified: 2026-04-06
# Groq 以推理速度见长（LPU 芯片），适合对延迟敏感的场景

[providers.groq]
display_name = "Groq"
base_url = "https://api.groq.com/openai/v1"  # verified: 2026-04-06
api_key_env = "GROQ_API_KEY"
auth_header = "Authorization"
auth_scheme = "Bearer"
timeout_secs = 60  # Groq 推理极快，超时可以设短
max_retries = 3
openai_compatible = true

# --- 模型定义 ---

# verified: 2026-04-06
[[models]]
id = "llama-3.3-70b-versatile"
provider = "groq"
display_name = "Llama 3.3 70B Versatile (Groq)"
context_window = 131072
max_output_tokens = 32768
input_price_per_1m = 0.59
output_price_per_1m = 0.79
capabilities = ["Chat", "CodeGeneration", "Reasoning"]
[models.features]
vision = false
tool_use = true
json_mode = true
streaming = true
system_prompt = true

