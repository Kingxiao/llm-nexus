# Ollama 本地推理预设
# 使用方法：
#   1. 安装 Ollama: https://ollama.com
#   2. 拉取模型: ollama pull llama3.1
#   3. Ollama 默认监听 http://localhost:11434，自带 OpenAI 兼容接口
#   4. 将此文件内容合并到 config/providers.toml 和 config/models.toml
#
# 无需 API key，本地运行

[providers.ollama]
display_name = "Ollama (Local)"
base_url = "http://localhost:11434/v1"  # verified: 2026-04-06
api_key_env = "OLLAMA_API_KEY"  # Ollama 不校验 key，可留空或设为任意值
auth_header = "Authorization"
auth_scheme = "Bearer"
timeout_secs = 300  # 本地推理首次加载模型较慢，适当放大超时
max_retries = 1
openai_compatible = true

# --- 模型定义 ---
# 注意：Ollama 模型 ID 与 ollama pull 时的名称一致
# 定价均为 0（本地推理无 API 费用）
# context_window 和 max_output_tokens 取决于模型和 VRAM，以下为默认值

# verified: 2026-04-06
[[models]]
id = "llama3.1"
provider = "ollama"
display_name = "Llama 3.1 8B (Ollama)"
context_window = 131072
max_output_tokens = 8192
input_price_per_1m = 0.0
output_price_per_1m = 0.0
capabilities = ["Chat", "CodeGeneration", "Reasoning"]
[models.features]
vision = false
tool_use = true
json_mode = true
streaming = true
system_prompt = true

